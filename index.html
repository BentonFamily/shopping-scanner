<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Scanner</title>

  <script src="https://unpkg.com/@zxing/browser@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    button {
      padding: 12px 16px;
      background: orange;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
      border-radius: 12px;
      background: black;
    }

    #result {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Shopping Scanner</h1>

  <button onclick="startScanner()">Start Scanner</button>

  <video id="preview"></video>

  <div id="result">No barcode scanned yet.</div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxjJJZ3ycaWujAdrUYzJ0XZOyTaB3xV5Xfg-VBsmTJMN_bLqbQT4-dGI-WXH6BBd9EDdg/exec';

    let codeReader;
    let controls;

    async function startScanner() {
      document.getElementById('result').innerHTML = 'Starting camera...';
      codeReader = new ZXingBrowser.BrowserMultiFormatReader();

      const videoElement = document.getElementById('preview');

      controls = await codeReader.decodeFromVideoDevice(
        null,
        videoElement,
        async (result, err) => {

          if (result) {
            console.log('Barcode detected:', result.getText());
            const barcode = result.getText();

           document.getElementById('result').innerHTML =
  	   `Scanned barcode: ${barcode}<br>Looking up product...`;

	   await lookupBarcode(barcode);
          }
        }
      );
    }

	function lookupBarcode(barcode) {
  return new Promise((resolve, reject) => {
    const callbackName = `barcodeLookup_${Date.now()}`;

    window[callbackName] = function(data) {
      delete window[callbackName];
      script.remove();

      console.log('Lookup response:', data);

      if (data.ok && data.product) {
        document.getElementById('result').innerHTML =
          `✅ ${data.product.productName}<br><small>${data.product.brand || ''}</small>`;
      } else {
        document.getElementById('result').innerHTML =
          `❌ Unknown barcode: ${barcode}`;
      }

      resolve(data);
    };

    const script = document.createElement('script');
    script.src = `${API_URL}?action=lookup&barcode=${encodeURIComponent(barcode)}&callback=${callbackName}`;

    script.onerror = function() {
      delete window[callbackName];
      script.remove();

      document.getElementById('result').innerHTML =
        `❌ Lookup failed<br><small>JSONP request failed</small>`;

      reject(new Error('JSONP request failed'));
    };

    document.body.appendChild(script);
  });
}
  </script>

</body>
</html>
